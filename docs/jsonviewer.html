<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <!-- 核心代码：0秒后跳转到新地址 -->

    <title>页面跳转中...</title>
</head>

<body>
    <p>页面已迁移，如果浏览器没有自动跳转，请点击：<a href="https://xkkevin.github.io/tools/jsonviewer/index.html">新链接</a></p>
    <script>
        window.location.href = "https://xkkevin.github.io/tools/jsonviewer/index.html";
    </script>
</body>

</html>
