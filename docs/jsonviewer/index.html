    <script>
        window.__UTOOLS_PENDING_TEXT__ = '';
        window.__UTOOLS_SHOULD_INJECT__ = false;
        window.__UTOOLS_INJECT_TRY_COUNT__ = 0;
        window.exports = {
            "jsonview": {
                mode: "none",
                args: {
                    enter: () => {
                        document.title = 'JSON Viewer - uTools';
                    }
                }
            },
            "jsonview-text": {
                mode: "text",
                args: {
                    enter: (action) => {
                        document.title = 'JSON Viewer - uTools';
                        const payload = (function(action) {
                            if (!action) return '';
                            const cands = [action.payload, action.text, action.value, action.data];
                            for (const v of cands) {
                                if (typeof v === 'string' && v.trim()) return v;
                                if (Array.isArray(v) && v.length && typeof v[0] === 'string') return v[0];
                                if (v && typeof v === 'object') {
                                    if (typeof v.text === 'string' && v.text.trim()) return v.text;
                                    if (typeof v.value === 'string' && v.value.trim()) return v.value;
                                }
                            }
                            return '';
                        })(action);
                        if (payload) {
                            window.__UTOOLS_PENDING_TEXT__ = String(payload);
                            window.__UTOOLS_SHOULD_INJECT__ = true;
                            window.__UTOOLS_INJECT_TRY_COUNT__ = 0;
                            if (window.__injectTextIntoJsonView) {
                                window.__injectTextIntoJsonView();
                            }
                        } else if (navigator.clipboard && navigator.clipboard.readText) {
                            navigator.clipboard.readText().then((clipText) => {
                                if (clipText && clipText.trim()) {
                                    window.__UTOOLS_PENDING_TEXT__ = clipText;
                                    window.__UTOOLS_SHOULD_INJECT__ = true;
                                    window.__UTOOLS_INJECT_TRY_COUNT__ = 0;
                                    if (window.__injectTextIntoJsonView) window.__injectTextIntoJsonView();
                                }
                            }).catch(() => {});
                        }
                    }
                }
            }
        };
    </script>

            /**
             * 根据光标偏移量计算 JSON 路径（纯字符级解析，无外部依赖）
             * 状态机：用 expectKey 跟踪每个 object 层级的 key/value 位置
             */
            function formatBreadcrumbPath(path) {
                if (!path || path.length === 0) return '—';
                const parts = ['root'];

                for (let i = 0; i < path.length; i++) {
                    const node = path[i];
                    if (!node || node.type === 'root') continue;

                    if (node.type === 'object') {
                        if (node.key !== undefined && node.key !== null) {
                            parts.push(`{} "${node.key}"`);
                        } else if (node._idx !== undefined && node._idx !== null) {
                            parts.push(`{} ${node._idx}`);
                        }
                    } else if (node.type === 'array') {
                        if (node.key !== undefined && node.key !== null) {
                            parts.push(`[] "${node.key}"`);
                        } else if (node._idx !== undefined && node._idx !== null) {
                            parts.push(`[] ${node._idx}`);
                        }
                    } else if (node.type === 'primitive') {
                        if (node.inArray) {
                            parts.push(`[] ${node._idx}`);
                        } else if (node.key !== undefined && node.key !== null) {
                            parts.push(`{} "${node.key}"`);
                        }
                    }
                }

                return parts.join(' > ');
            }

            /**
             * 扫描 JSON 文本，基于光标 offset 推断 breadcrumb 路径。
             * 这是保守实现：仅在标准 JSON 结构清晰时返回路径。
             */
            function getJsonPathAtOffset(text, offset) {
                const path = [{
                    type: 'root'
                }];
                const stack = [];
                let i = 0;
                let pendingKey = null;

                function current() {
                    return stack[stack.length - 1] || null;
                }

                function skipWS(pos) {
                    while (pos < text.length && isWS(text[pos])) pos++;
                    return pos;
                }

                while (i < text.length) {
                    i = skipWS(i);
                    if (i >= text.length) break;
                    const ch = text[i];
                    const ctx = current();

                    if (ch === '"') {
                        const end = findStringEnd(text, i);
                        if (end === -1) break;
                        const strVal = text.substring(i + 1, end);
                        const after = skipWS(end + 1);
                        const isKey = after < text.length && text[after] === ':' && ctx && ctx.kind === 'object';
                        const valueStart = isKey ? skipWS(after + 1) : -1;

                        if (offset >= i && offset <= end) {
                            if (isKey) {
                                return [...path, {
                                    type: 'primitive',
                                    key: strVal,
                                    inArray: false
                                }];
                            }
                            if (ctx && ctx.kind === 'array') {
                                return [...path, {
                                    type: 'primitive',
                                    _idx: ctx.index,
                                    inArray: true
                                }];
                            }
                            if (pendingKey !== null) {
                                return [...path, {
                                    type: 'primitive',
                                    key: pendingKey,
                                    inArray: false
                                }];
                            }
                            return path;
                        }

                        if (isKey && offset > end && offset < valueStart) {
                            return [...path, {
                                type: 'primitive',
                                key: strVal,
                                inArray: false
                            }];
                        }

                        if (!isKey && offset === end + 1) {
                            if (ctx && ctx.kind === 'array') {
                                return [...path, {
                                    type: 'primitive',
                                    _idx: ctx.index,
                                    inArray: true
                                }];
                            }
                            if (pendingKey !== null) {
                                return [...path, {
                                    type: 'primitive',
                                    key: pendingKey,
                                    inArray: false
                                }];
                            }
                            return path;
                        }

                        if (isKey) {
                            pendingKey = strVal;
                            i = after + 1;
                            continue;
                        }

                        if (ctx && ctx.kind === 'array') ctx.index += 1;
                        pendingKey = null;
                        i = end + 1;
                        continue;
                    }

                    if (ch === '{') {
                        const parent = current();
                        let seg;
                        if (parent && parent.kind === 'array') seg = {
                            type: 'object',
                            _idx: parent.index
                        };
                        else if (pendingKey !== null) seg = {
                            type: 'object',
                            key: pendingKey
                        };
                        if (seg) path.push(seg);
                        stack.push({
                            kind: 'object'
                        });
                        pendingKey = null;
                        if (offset === i) return path;
                        i++;
                        continue;
                    }

                    if (ch === '[') {
                        const parent = current();
                        let seg;
                        if (parent && parent.kind === 'array') seg = {
                            type: 'array',
                            _idx: parent.index
                        };
                        else if (pendingKey !== null) seg = {
                            type: 'array',
                            key: pendingKey
                        };
                        if (seg) path.push(seg);
                        stack.push({
                            kind: 'array',
                            index: 0
                        });
                        pendingKey = null;
                        if (offset === i) return path;
                        i++;
                        continue;
                    }

                    if (ch === '}' || ch === ']') {
                        if (offset === i) return path;
                        stack.pop();
                        if (path.length > 1) path.pop();
                        const parent = current();
                        if (parent && parent.kind === 'array') parent.index += 1;
                        pendingKey = null;
                        i++;
                        continue;
                    }

                    if (ch === ',') {
                        pendingKey = null;
                        i++;
                        continue;
                    }

                    if (ch === ':') {
                        i++;
                        continue;
                    }

                    if (isJSONLiteralChar(ch)) {
                        let startLit = i;
                        while (i < text.length && isJSONLiteralChar(text[i])) i++;
                        const endLit = i - 1;
                        if (offset >= startLit && offset <= endLit + 1) {
                            if (ctx && ctx.kind === 'array') return [...path, {
                                type: 'primitive',
                                _idx: ctx.index,
                                inArray: true
                            }];
                            if (pendingKey !== null) return [...path, {
                                type: 'primitive',
                                key: pendingKey,
                                inArray: false
                            }];
                            return path;
                        }
                        if (ctx && ctx.kind === 'array') ctx.index += 1;
                        pendingKey = null;
                        continue;
                    }

                    i++;
                }

                return path;
            }

            function isWS(ch) {
                return ch === ' ' || ch === '\t' || ch === '\n' || ch === '\r';
            }

            function isJSONLiteralChar(ch) {
                return (ch >= '0' && ch <= '9') || ch === '-' || ch === '.' ||
                    ch === 'e' || ch === 'E' || ch === '+' ||
                    ch === 't' || ch === 'r' || ch === 'u' || ch === 'e' ||
                    ch === 'f' || ch === 'a' || ch === 'l' || ch === 's' ||
                    ch === 'n';
            }


            function findStringEnd(text, start) {
                if (start >= text.length || text[start] !== '"') return -1;
                let i = start + 1;
                while (i < text.length) {
                    if (text[i] === '\\') {
                        i += 2;
                        continue;
                    }
                    if (text[i] === '"') return i;
                    i++;
                }
                return -1;
            }


            /**
             * 根据 path 在已解析的 JSON 中定位到对应值，并返回统计信息
             */
            function computeStatsFromPath(content, path) {
                if (!path || path.length === 0) return '';

                let obj;
                try {
                    obj = JSON.parse(content);
                } catch {
                    return '';
                }

                let current = obj;
                for (let i = 0; i < path.length; i++) {
                    const node = path[i];
                    if (!node || node.type === 'root') continue;

                    if (node.key !== undefined && node.key !== null) {
                        if (current && typeof current === 'object') {
                            current = current[node.key];
                        } else {
                            return '';
                        }
                    } else if (node._idx !== undefined && node._idx !== null) {
                        if (Array.isArray(current)) {
                            current = current[node._idx];
                        } else {
                            return '';
                        }
                    }
                }

                if (Array.isArray(current)) {
                    return `当前数组长度：${current.length}`;
                }

                if (current && typeof current === 'object') {
                    return `当前字典键值对个数：${Object.keys(current).length}`;
                }

                if (typeof current === 'string') {
                    return `当前字符串长度：${current.length}`;
                }

                return '';
            }

            /**
             * 更新 breadcrumb 显示
             */
            function updateBreadcrumb() {
                if (!monacoEditor || !breadcrumbPathEl) return;

                const content = monacoEditor.getValue();
                const cursorPos = monacoEditor.getPosition();

                if (!cursorPos || !content) {
                    breadcrumbPathEl.textContent = '—';
                    if (breadcrumbStatsEl) breadcrumbStatsEl.textContent = '';
                    return;
                }

                // 计算光标在文本中的偏移量
                const model = monacoEditor.getModel();
                if (!model) {
                    breadcrumbPathEl.textContent = '—';
                    if (breadcrumbStatsEl) breadcrumbStatsEl.textContent = '';
                    return;
                }

                const offset = model.getOffsetAt(cursorPos);
                const path = getJsonPathAtOffset(content, offset);

                if (!path) {
                    breadcrumbPathEl.textContent = '—';
                    if (breadcrumbStatsEl) breadcrumbStatsEl.textContent = '';
                    return;
                }

                breadcrumbPathEl.textContent = formatBreadcrumbPath(path);
                if (breadcrumbStatsEl) {
                    breadcrumbStatsEl.textContent = computeStatsFromPath(content, path);
                }
            }

            // ---------- 悬浮滚动按钮逻辑 (监听主编辑器滚动) ----------
            function updateScrollButtonsVisibility() {
                if (!monacoEditor) return;
                const editorDomNode = monacoEditor.getDomNode();
                if (!editorDomNode) return;
                // 获取编辑器的滚动条信息
                const editorScrollTop = monacoEditor.getScrollTop();
                const editorScrollHeight = monacoEditor.getScrollHeight();
                const editorHeight = monacoEditor.getLayoutInfo().height;
                const hasScroll = editorScrollHeight > editorHeight;
                if (hasScroll) {
                    scrollButtons.classList.add('visible');
                } else {
                    scrollButtons.classList.remove('visible');
                }
            }

            // 初始化拖拽排序
            function initSortable() {
                if (sortable) {
                    sortable.destroy();
                }

                sortable = new Sortable(tabsBarEl, {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    handle: '.tab',
                    onEnd: function(evt) {
                        // 重新排序 tabs 数组
                        const oldIndex = evt.oldIndex;
                        const newIndex = evt.newIndex;

                        if (oldIndex !== newIndex) {
                            const movedTab = tabs[oldIndex];
                            tabs.splice(oldIndex, 1);
                            tabs.splice(newIndex, 0, movedTab);

                            // 重新渲染标签页（保持激活状态）
                            renderTabs();

                            // 重新初始化拖拽（因为DOM被重新渲染了）
                            initSortable();

                            showStatus('✓ 标签页顺序已调整');
                        }
                    }
                });
            }

            // 清空当前Tab内容
            clearEditorBtn.addEventListener('click', () => {
                if (!activeTabId) return;
                const tab = tabs.find(t => t.id === activeTabId);
                if (!tab) return;

                tab.content = '';
                monacoEditor.setValue('');
                showStatus('✓ 已清空');
            });


            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === '=' || e.key === '+') {
                        e.preventDefault();
                        if (monacoEditor) {
                            currentFontSize = Math.min(25, currentFontSize + 1);
                            monacoEditor.updateOptions({
                                fontSize: currentFontSize
                            });
                            if (modalMonacoEditor) modalMonacoEditor.updateOptions({
                                fontSize: currentFontSize
                            });
                            document.body.style.fontSize = currentFontSize + 'px';
                            showStatus(`✓ 字号: ${currentFontSize}px`);
                        }
                    } else if (e.key === '-' || e.key === '_') {
                        e.preventDefault();
                        if (monacoEditor) {
                            currentFontSize = Math.max(10, currentFontSize - 1);
                            monacoEditor.updateOptions({
                                fontSize: currentFontSize
                            });
                            if (modalMonacoEditor) modalMonacoEditor.updateOptions({
                                fontSize: currentFontSize
                            });
                            document.body.style.fontSize = currentFontSize + 'px';
                            showStatus(`✓ 字号: ${currentFontSize}px`);
                        }
                    }
                }
            });

            function showStatus(message, isError = false) {
                statusBar.style.display = 'block';
                statusBar.textContent = message;
                statusBar.style.background = isError ? '#a12626' : '#007acc';
                setTimeout(() => {
                    statusBar.style.display = 'none';
                }, 3000);
            }

            function copyToClipboard(text, button) {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => {
                        showCopySuccess(button);
                    }).catch(err => {
                        console.warn('Clipboard API 失败，尝试备用方法:', err);
                        fallbackCopy(text, button);
                    });
                } else {
                    fallbackCopy(text, button);
                }
            }

            function fallbackCopy(text, button) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.left = '-999px';
                textarea.style.top = '-999px';
                document.body.appendChild(textarea);

                try {
                    textarea.select();
                    textarea.setSelectionRange(0, textarea.value.length);
                    const successful = document.execCommand('copy');

                    if (successful) {
                        showCopySuccess(button);
                    } else {
                        showStatus('✗ 复制失败，请手动复制', true);
                    }
                } catch (err) {
                    console.error('复制失败:', err);
                    showStatus('✗ 复制失败，请手动复制', true);
                } finally {
                    document.body.removeChild(textarea);
                }
            }

            function showCopySuccess(button) {
                const originalText = button.textContent;
                button.textContent = '✓ 已复制';
                button.classList.add('copied');
                showStatus('✓ 复制成功');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 1500);
            }

            copyEditorBtn.addEventListener('click', () => {

            // 高级渲染开关事件
            renderToggleCheckbox.addEventListener('change', () => {

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function closeModal() {
                if (modalMonacoEditor) {
                    modalMonacoEditor.dispose();
                    modalMonacoEditor = null;
                }
                modal.classList.add('hidden');
                backdrop.classList.add('hidden');
                currentContent = '';
                currentKey = '';
                currentModalPrettyJson = '';

            function createModalMonaco(jsonContent) {
                modalBody.innerHTML = '<div id="modalMonacoContainer" class="modal-monaco-container"></div>';

                const container = document.getElementById('modalMonacoContainer');
                if (!container) return;

                if (modalMonacoEditor) {
                    modalMonacoEditor.dispose();
                }

                require(['vs/editor/editor.main'], function() {
                    modalMonacoEditor = monaco.editor.create(container, {
                        value: jsonContent,
                        language: 'json',
                        theme: 'vs-dark',
                        readOnly: true,
                        automaticLayout: true,
                        fontSize: currentFontSize,
                        wordWrap: wordWrapEnabled ? 'on' : 'off',
                        minimap: {
                            enabled: true
                        },
                        lineNumbers: 'on',
                        glyphMargin: false,
                        folding: true,
                        scrollBeyondLastLine: false
                    });
                });
            }

            // 判断是否为Markdown内容
            function isMarkdownContent(content) {
                const markdownPatterns = [
                    /^#+\s/m, // 标题
                    /\*\*.*\*\*/m, // 粗体
                    /\*.*\*/m, // 斜体
                    /`.*`/m, // 行内代码
                    /```[\s\S]*?```/m, // 代码块
                    /^\s*[-*+]\s/m, // 无序列表
                    /^\s*\d+\.\s/m, // 有序列表
                    /^\s*>\s/m, // 引用
                    /\[.*\]\(.*\)/m, // 链接
                    /!\[.*\]\(.*\)/m, // 图片
                    /^\s*\|.*\|/m // 表格
                ];

                return markdownPatterns.some(pattern => pattern.test(content));
            }

            // 判断是否为JSON字符串
            function isJsonString(content) {
                const trimmed = content.trim();
                if (!(trimmed.startsWith('{') && trimmed.endsWith('}')) &&
                    !(trimmed.startsWith('[') && trimmed.endsWith(']'))) {
                    return false;
                }

                try {
                    JSON.parse(content);
                    return true;
                } catch (e) {
                    return false;
                }
            }

            function renderContent(content, keyName, enableAdvancedRender) {
                modalKeySpan.textContent = keyName || 'value';
                currentContent = content;
                currentKey = keyName;

                // 清空modalBody
                modalBody.innerHTML = '';
                modalBody.classList.remove('markdown-body');

                if (enableAdvancedRender) {
                    try {
                        // 高级渲染模式
                        if (isJsonString(content)) {
                            // JSON内容 - 使用Monaco渲染
                            const parsedJson = JSON.parse(content);
                            const prettyJson = JSON.stringify(parsedJson, null, 2);
                            createModalMonaco(prettyJson);
                            currentModalPrettyJson = prettyJson;
                            // 显示插入按钮
                            insertAsNewTabBtn.style.display = 'flex';
                        } else if (isMarkdownContent(content)) {
                            // Markdown内容 - 使用marked渲染
                            modalBody.classList.add('markdown-body');
                            modalBody.innerHTML = marked.parse(content);
                            // 隐藏插入按钮
                            insertAsNewTabBtn.style.display = 'none';
                        } else {
                            // 普通文本
                            modalBody.innerHTML = `<pre style="margin:0; background:transparent; padding:0; white-space:pre-wrap; font-family: inherit; font-size: ${currentFontSize}px; color: #e1e1e1;">${escapeHtml(content)}</pre>`;
                            insertAsNewTabBtn.style.display = 'none';
                        }
                    } catch (e) {
                        modalBody.innerHTML = `<pre style="font-size: ${currentFontSize}px; color: #e1e1e1;">${escapeHtml(content)}</pre>`;
                    }
                } else {
                    // 简单渲染模式 - 直接显示纯文本
                    modalBody.innerHTML = `<pre style="margin:0; background:transparent; padding:0; white-space:pre-wrap; font-family: inherit; font-size: ${currentFontSize}px; color: #e1e1e1;">${escapeHtml(content)}</pre>`;
                }

                modal.classList.remove('hidden');
                backdrop.classList.remove('hidden');
            }

            function extractKeyValue(lineContent) {
                lineContent = lineContent.trim().replace(/,$/, '');
                if (!lineContent.startsWith('{')) {
                    lineContent = '{' + lineContent + '}';
                }
                try {
                    const obj = JSON.parse(lineContent);
                    return {
                        key: Object.keys(obj)[0],
                        value: Object.values(obj)[0]
                    };
                } catch (e) {
                    return null;
                }
            }

            function setupDoubleClick(editor) {
                if (!editor) return;

                let lastClickTime = 0;

                editor.onMouseDown((e) => {
                    const currentTime = Date.now();
                    const timeDiff = currentTime - lastClickTime;
                    lastClickTime = currentTime;

                    if (timeDiff < 300 && timeDiff > 0) {
                        const pos = e.target.position;
                        if (!pos) return;

                        const model = editor.getModel();
                        if (!model) return;

                        const lineContent = model.getLineContent(pos.lineNumber);
                        const result = extractKeyValue(lineContent);

                        if (result) {
                            const {
                                key,
                                value
                            } = result;
                            // 使用当前高级渲染开关的状态
                            renderContent(value, key, renderToggleCheckbox.checked);
                        }
                    }
                });
            }

            function pythonDictToJson(pythonDict) {
                let result = '';
                let quoteType = null; // 当前字符串的引号类型
                let inString = false; // 是否在字符串中

                // 需要替换的Python关键字
                const keywords = {
                    'None': 'null',
                    'True': 'true',
                    'False': 'false'
                };

                let currentWord = ''; // 当前正在构建的单词
                let i = 0;
                while (i < pythonDict.length) {
                    const char = pythonDict[i];

                    if (char === '"' || char === "'") {
                        if (inString) {
                            if (char === quoteType) {
                                // 结束字符串
                                inString = false;
                                quoteType = null;
                                result += '"' + currentWord + '"'; // 将字符串用双引号包裹
                                currentWord = ''; // 重置当前单词
                            } else if (char === '"') {
                                if (currentWord.endsWith('\\')) {
                                    // 转义引号，继续构建字符串
                                    currentWord += char;
                                } else {
                                    currentWord += "\\" + char; // 转义引号
                                }
                            } else {
                                currentWord += char; // 继续构建字符串
                            }
                        } else {
                            quoteType = char; // 记录引号类型
                            inString = true; // 进入字符串
                        }
                    } else {
                        if (inString) {
                            if (char === '\\' && pythonDict[i + 1] === quoteType) {
                                if (quoteType === "'") {
                                    currentWord += "'";
                                } else {
                                    currentWord += '\\"';
                                }
                                i++; // 跳过下一个字符
                            } else {
                                currentWord += char; // 继续构建字符串
                            }
                        } else {
                            // 处理非字符串部分，替换Python关键字
                            if (/\s/.test(char) || char === ':' || char === ',' || char === '{' || char === '}' || char === '[' || char === ']') {
                                // 遇到分隔符，检查当前单词是否是需要替换的关键字
                                if (currentWord in keywords) {
                                    result += keywords[currentWord]; // 替换关键字
                                } else {
                                    result += currentWord; // 保持原样
                                }
                                result += char; // 添加分隔符
                                currentWord = ''; // 重置当前单词
                            } else {
                                currentWord += char; // 继续构建单词
                            }
                        }
                    }
                    i++;
                }
                return result;
            }

            function formatJson(content, mode) {
                let obj;
                try {
                    obj = JSON.parse(content);
                } catch (e) {
                    // const jsonStr = pythonDictToJson(content);
                    // obj = JSON.parse(jsonStr);
                    throw new Error('格式化失败：' + e.message);

                }

                if (mode === 'compact') {
                    return JSON.stringify(obj);
                } else {
                    return JSON.stringify(obj, null, 2);
                }

            }

            // 监听编辑器滚动事件来显示/隐藏按钮
            function bindEditorScrollListener() {
                if (!monacoEditor) return;
                monacoEditor.onDidScrollChange(() => {
                    updateScrollButtonsVisibility();
                });
                // 内容变化也可能导致滚动条出现/消失
                monacoEditor.onDidContentSizeChange(() => {
                    updateScrollButtonsVisibility();
                });
                setTimeout(updateScrollButtonsVisibility, 200);
            }

            function scrollEditorToTop() {
                if (monacoEditor) {
                    monacoEditor.setScrollTop(0);
                    showStatus('已滚动至顶部');
                }
            }

            function scrollEditorToBottom() {
                if (monacoEditor) {
                    const scrollHeight = monacoEditor.getScrollHeight();
                    monacoEditor.setScrollTop(scrollHeight);
                    showStatus('已滚动至底部');
                }
            }

            function insertModalContentAsNewTab() {
                if (!currentModalPrettyJson) {
                    showStatus('当前内容不是有效的JSON，无法插入为新标签页', true);
                    return;
                }
                const newId = nextTabId++;
                const newTab = {
                    id: newId,
                    name: `Tab ${newId}`,
                    content: currentModalPrettyJson,
                };
                tabs.push(newTab);
                activeTabId = newId;
                renderTabs();
                monacoEditor.setValue(currentModalPrettyJson);
                initSortable(); // 重新绑定拖拽
                showStatus(`✓ 已创建新标签页 Tab ${newId} 并载入JSON数据`);
                closeModal(); // 可选: 关闭弹窗, 体验更好
            }

            function formatCurrent() {
                if (!activeTabId) return;
                const tab = tabs.find(t => t.id === activeTabId);
                if (!tab) return;

                try {
                    const formatted = formatJson(tab.content, currentFormatMode);
                    tab.content = formatted;
                    monacoEditor.setValue(formatted);
                    showStatus(`✓ 已切换为${currentFormatMode === 'compact' ? '压缩' : '格式化'}模式`);
                } catch (err) {
                    showStatus('✗ ' + err.message, true);
                }
            }

            function smartFormatText(raw) {
                const trimmed = (raw || '').trim();
                if (!trimmed) return '';
                try {
                    return JSON.stringify(JSON.parse(trimmed), null, 2);
                } catch (e) {}
                try {
                    const jsonStr = pythonDictToJson(trimmed);
                    return JSON.stringify(JSON.parse(jsonStr), null, 2);
                } catch (e) {}
                return raw;
            }

            async function tryReadClipboardIntoPending() {
                if (window.__UTOOLS_PENDING_TEXT__) return;
                try {
                    if (navigator.clipboard && navigator.clipboard.readText) {
                        const clipText = await navigator.clipboard.readText();
                        if (clipText && clipText.trim()) {
                            window.__UTOOLS_PENDING_TEXT__ = clipText;
                            window.__UTOOLS_SHOULD_INJECT__ = true;
                        }
                    }
                } catch (e) {}
            }

            window.__injectTextIntoJsonView = function() {
                if ((!window.__UTOOLS_SHOULD_INJECT__ || !window.__UTOOLS_PENDING_TEXT__) && navigator.clipboard && navigator.clipboard.readText) {
                    tryReadClipboardIntoPending().then(() => {
                        if (window.__UTOOLS_SHOULD_INJECT__ && window.__UTOOLS_PENDING_TEXT__) {
                            setTimeout(() => window.__injectTextIntoJsonView(), 80);
                        }
                    });
                    return;
                }

                if (!monacoEditor || !activeTabId) {
                    if (window.__UTOOLS_INJECT_TRY_COUNT__ < 40) {
                        window.__UTOOLS_INJECT_TRY_COUNT__ += 1;
                        setTimeout(() => window.__injectTextIntoJsonView(), 150);
                    }
                    return;
                }

                const tab = tabs.find(t => t.id === activeTabId);
                if (!tab) {
                    if (window.__UTOOLS_INJECT_TRY_COUNT__ < 40) {
                        window.__UTOOLS_INJECT_TRY_COUNT__ += 1;
                        setTimeout(() => window.__injectTextIntoJsonView(), 150);
                    }
                    return;
                }

                const finalText = smartFormatText(window.__UTOOLS_PENDING_TEXT__);
                tab.content = finalText;
                monacoEditor.setValue(finalText);
                window.__UTOOLS_SHOULD_INJECT__ = false;
                window.__UTOOLS_INJECT_TRY_COUNT__ = 0;
                showStatus('✓ 已接收文本并载入 JSON Viewer');
            };

            function convertPythonDict() {
                if (!activeTabId) return;
                const tab = tabs.find(t => t.id === activeTabId);
                if (!tab) return;

                try {
                    const jsonStr = pythonDictToJson(tab.content);
                    const obj = JSON.parse(jsonStr);
                    const prettyJson = JSON.stringify(obj, null, 2);

                    tab.content = prettyJson;
                    monacoEditor.setValue(prettyJson);
                    showStatus('✓ Python字典转换成功！');
                } catch (err) {
                    showStatus('✗ 转换失败：' + err.message, true);
                }
            }

            function switchTab(tabId) {
                const tab = tabs.find(t => t.id === tabId);
                if (!tab) return;

                activeTabId = tabId;
                renderTabs();

                if (monacoEditor) {
                    monacoEditor.setValue(tab.content);
                    setTimeout(() => {
                        updateScrollButtonsVisibility();
                        updateBreadcrumb();
                    }, 50);
                }
            }

            function createNewTab() {
                const newId = nextTabId++;
                const newTab = {
                    id: newId,
                    name: `Tab ${newId}`,
                    content: "",
                    parsedJson: null
                };

                tabs.push(newTab);
                activeTabId = newId;
                renderTabs();

                if (monacoEditor) {
                    monacoEditor.setValue(newTab.content);
                    setTimeout(() => {
                        updateScrollButtonsVisibility();
                        updateBreadcrumb();
                    }, 50);
                }
            }

            function closeTab(tabId) {
                if (tabs.length <= 1) {
                    showStatus('至少保留一个标签页', true);
                    return;
                }

                const idx = tabs.findIndex(t => t.id === tabId);
                if (idx !== -1) tabs.splice(idx, 1);

                if (activeTabId === tabId) {
                    activeTabId = tabs[0].id || null;
                }

                renderTabs();

                if (activeTabId) {
                    const tab = tabs.find(t => t.id === activeTabId);
                    if (monacoEditor) {
                        monacoEditor.setValue(tab.content);
                        setTimeout(() => updateBreadcrumb(), 50);
                    }
                }
            }

            function renderTabs() {
                let html = '';
                for (let tab of tabs) {
                    html += `<div class="tab ${tab.id === activeTabId ? 'active' : ''}" data-tab-id="${tab.id}">
                        <span class="tab-name">${tab.name}</span>
                        <span class="close-tab" data-close-id="${tab.id}">✕</span>
                    </div>`;
                }
                tabsBarEl.innerHTML = html;

                document.querySelectorAll('.tab').forEach(el => {
                    el.addEventListener('click', (e) => {
                        if (e.target.classList.contains('close-tab')) return;
                        const tid = el.dataset.tabId;
                        if (tid) switchTab(Number(tid));
                    });
                });

                document.querySelectorAll('.close-tab').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const tid = btn.dataset.closeId;
                        if (tid) closeTab(Number(tid));
                    });
                });
            }

            function initMonaco() {
                require(['vs/editor/editor.main'], function() {
                    monacoEditor = monaco.editor.create(monacoContainer, {
                        value: '',
                        language: 'json',
                        theme: 'vs-dark',
                        automaticLayout: true,
                        fontSize: currentFontSize,
                        wordWrap: wordWrapEnabled ? 'on' : 'off',
                        minimap: {
                            enabled: true
                        },
                        lineNumbers: 'on',
                        glyphMargin: false,
                        folding: true,
                        scrollBeyondLastLine: false
                    });

                    let autoFormatAfterPaste = false;
                    let isApplyingSmartFormat = false;

                    function trySmartFormatAfterPaste() {
                        if (!activeTabId || isApplyingSmartFormat || !monacoEditor) return;
                        const tab = tabs.find(t => t.id === activeTabId);
                        if (!tab) return;

                        const raw = monacoEditor.getValue();
                        const trimmed = raw.trim();
                        if (!trimmed) return;

                        currentFormatMode = 'pretty';
                        formatPrettyBtn.classList.add('active');
                        formatCompactBtn.classList.remove('active');

                        try {
                            const pretty = JSON.stringify(JSON.parse(trimmed), null, 2);
                            isApplyingSmartFormat = true;
                            if (pretty !== raw) {
                                tab.content = pretty;
                                monacoEditor.setValue(pretty);
                            }
                            showStatus('✓ 已自动按标准 JSON 格式化');
                            isApplyingSmartFormat = false;
                            return;
                        } catch (e) {}

                        try {
                            const jsonStr = pythonDictToJson(trimmed);
                            const pretty = JSON.stringify(JSON.parse(jsonStr), null, 2);
                            isApplyingSmartFormat = true;
                            tab.content = pretty;
                            monacoEditor.setValue(pretty);
                            showStatus('✓ 已自动按 Python dict 解析并格式化');
                            isApplyingSmartFormat = false;
                            return;
                        } catch (e) {}
                    }

                    const editorDomNode = monacoEditor.getDomNode();
                    if (editorDomNode) {
                        editorDomNode.addEventListener('paste', () => {
                            if (!autoFormatToggle || !autoFormatToggle.checked) return;
                            autoFormatAfterPaste = true;
                            setTimeout(() => {
                                if (autoFormatAfterPaste && !isApplyingSmartFormat) {
                                    autoFormatAfterPaste = false;
                                    trySmartFormatAfterPaste();
                                }
                            }, 30);
                        }, true);
                    }

                    monacoEditor.onDidChangeModelContent(() => {
                        if (activeTabId) {
                            const tab = tabs.find(t => t.id === activeTabId);
                            if (tab) tab.content = monacoEditor.getValue();
                        }
                        updateScrollButtonsVisibility();
                    });

                    // Breadcrumb: 光标移动时更新路径
                    monacoEditor.onDidChangeCursorPosition(() => {
                        updateBreadcrumb();
                    });

                    document.addEventListener('paste', () => {
                        if (!autoFormatToggle || !autoFormatToggle.checked) return;
                        const active = document.activeElement;
                        if (!active || !editorDomNode || !editorDomNode.contains(active)) return;
                        autoFormatAfterPaste = true;
                        setTimeout(() => {
                            if (autoFormatAfterPaste && !isApplyingSmartFormat) {
                                autoFormatAfterPaste = false;
                                trySmartFormatAfterPaste();
                            }
                        }, 30);
                    }, true);

                    setupDoubleClick(monacoEditor);

                    // monacoEditor.addCommand(monaco.KeyMod.Alt | monaco.KeyCode.KeyZ, () => {
                    //     wordWrapEnabled = !wordWrapEnabled;
                    //     wordWrapToggle.checked = wordWrapEnabled;
                    //     monacoEditor.updateOptions({
                    //         wordWrap: wordWrapEnabled ? 'on' : 'off'
                    //     });
                    //     if (modalMonacoEditor) {
                    //         modalMonacoEditor.updateOptions({
                    //             wordWrap: wordWrapEnabled ? 'on' : 'off'
                    //         });
                    //     }
                    //     showStatus(`自动换行: ${wordWrapEnabled ? '开启' : '关闭'}`);
                    // });

                    createNewTab();
                    setTimeout(() => {
                        if (window.__injectTextIntoJsonView) window.__injectTextIntoJsonView();
                    }, 100);
                    setTimeout(() => {
                        if (window.__injectTextIntoJsonView) window.__injectTextIntoJsonView();
                    }, 500);
                    setTimeout(() => {
                        if (window.__injectTextIntoJsonView) window.__injectTextIntoJsonView();
                    }, 1200);

                    // 初始化拖拽排序
                    initSortable();
                    bindEditorScrollListener(); // 滚动监听 + 按钮显隐
                    scrollToTopBtn.addEventListener('click', scrollEditorToTop);
                    scrollToBottomBtn.addEventListener('click', scrollEditorToBottom);
                    insertAsNewTabBtn.addEventListener('click', insertModalContentAsNewTab);
                });
            }

            // 监听 Alt + Z 切换单词换行
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Ω' || (e.altKey && e.key.toLowerCase() === 'z')) {
                    e.preventDefault();
                    wordWrapEnabled = !wordWrapEnabled;
                    wordWrapToggle.checked = wordWrapEnabled;
                    monacoEditor.updateOptions({
                        wordWrap: wordWrapEnabled ? 'on' : 'off'
                    });
                    if (modalMonacoEditor) {
                        modalMonacoEditor.updateOptions({
                            wordWrap: wordWrapEnabled ? 'on' : 'off'
                        });
                    }
                    showStatus(`自动换行: ${wordWrapEnabled ? '开启' : '关闭'}`);
                }
            });

            newTabBtn.addEventListener('click', () => {
                if (monacoEditor) {
                    createNewTab();
                    // 重新初始化拖拽（因为DOM被重新渲染了）
                    setTimeout(() => initSortable(), 100);
                }
            });

            parsePythonBtn.addEventListener('click', convertPythonDict);

            wordWrapToggle.addEventListener('change', (e) => {
                wordWrapEnabled = e.target.checked;
                if (monacoEditor) {
                    monacoEditor.updateOptions({
                        wordWrap: wordWrapEnabled ? 'on' : 'off'
                    });
                }
            });

            closeModalBtn.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);

            window.onload = initMonaco;
        })();
    </script>
    <style>
        .modal-body h1,
        .modal-body h2,
        .modal-body h3 {
            color: #ddd;
            font-size: 1.8em;
        }
        
        .modal-body a {
            color: #3794ff;
        }
        
        .modal-body blockquote {
            border-left: 4px solid #0e639c;
            padding-left: 1.5em;
            color: #aaa;
        }
        
        .modal-body table {
            border-collapse: collapse;
        }
        
        .modal-body th,
        .modal-body td {
            border: 1px solid #404040;
            padding: 12px;
        }
        
        .modal-body .json-view {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.7;
        }
        
        .modal-monaco-container {
            width: 100%;
            height: calc(100% - 10px);
            min-height: 500px;
            border: 1px solid #404040;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .modal-body p {
            font-size: 13px;
            line-height: 1.8;
        }
        
        .modal-body li {
            font-size: 13px;
            line-height: 1.8;
        }
    </style>
</body>
